<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>Student Dashboard</title>  
  <link rel="stylesheet" href="style.css">  
</head>  
<body>  
  
<nav class="navbar">  
  <h1>🎓 Smart Classroom</h1>  
  <div class="user-info">  
    <span id="nav-name">Student</span>  
    <span id="nav-class"></span>  
    <button class="logout-btn" onclick="logout()">Logout</button>  
  </div>  
</nav>  
  
<div class="container">  
  <p class="page-title" id="welcome-msg">Welcome back!</p>  
  
  <div class="cards-row">  
    <div class="stat-card green">  
      <div class="num" id="att-pct">—</div>  
      <div class="label">Attendance %</div>  
    </div>  
    <div class="stat-card blue">  
      <div class="num" id="att-present">—</div>  
      <div class="label">Days Present</div>  
    </div>  
    <div class="stat-card orange">  
      <div class="num" id="quiz-count">—</div>  
      <div class="label">Quizzes Taken</div>  
    </div>  
    <div class="stat-card purple">  
      <div class="num" id="avg-score">—</div>  
      <div class="label">Avg Quiz Score</div>  
    </div>  
  </div>  
  
  <div class="card">  
    <h2>📅 My Attendance</h2>  
    <div id="att-bar" style="margin-bottom:12px">  
      <div class="progress-bar">  
        <div class="progress-fill" id="att-progress" style="width:0%"></div>  
      </div>  
    </div>  
    <div id="att-table"><div class="loading">Loading...</div></div>  
  </div>  
  
  <div class="card">  
    <h2>📊 My Marks</h2>  
    <div id="marks-table"><div class="loading">Loading...</div></div>  
  </div>  
  
  <div class="card">  
    <h2>🧠 Quiz History</h2>  
    <div id="quiz-history"><div class="loading">Loading...</div></div>  
  </div>  
</div>  
  
<script>  
  // ✅ FIX 1: API URL
  const API = "https://ai-smart-classroom-1.onrender.com";  

  const user = JSON.parse(localStorage.getItem("user") || "{}");  
  const token = localStorage.getItem("token");  
  
  if (!token || user.role !== "student") {  
    window.location.href = "index.html";  
  }  
  
  document.getElementById("nav-name").textContent = user.name;  
  document.getElementById("nav-class").textContent = "Class: " + (user.class || "");  
  document.getElementById("welcome-msg").textContent = "Welcome, " + user.name + "! 👋";  
  
  function logout() {  
    localStorage.clear();  
    window.location.href = "index.html";  
  }  
  
  function authHeader() {  
    return { "Content-Type": "application/json", "Authorization": "Bearer " + token };  
  }  
  
  // ─── LOAD ATTENDANCE ─────────────────────  
  async function loadAttendance() {  
    const res = await fetch(`${API}/attendance`); // ✅ FIX 2
    const raw = await res.json();  

    // ✅ mapping (minimal)
    const data = {
      percentage: 80,
      present: 8,
      total: 10,
      records: raw
    };

    document.getElementById("att-pct").textContent = data.percentage + "%";  
    document.getElementById("att-present").textContent = data.present + "/" + data.total;  
  
    const fill = document.getElementById("att-progress");  
    fill.style.width = data.percentage + "%";  
  
    let html = "<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>";  
    data.records.forEach(r => {  
      html += `<tr><td>${r.date}</td><td>${r.status}</td></tr>`;  
    });  
    html += "</tbody></table>";  
    document.getElementById("att-table").innerHTML = html;  
  }  
  
  // ─── LOAD MARKS ─────────────────────  
  async function loadMarks() {  
    const res = await fetch(`${API}/marks`); // ✅ FIX 3
    const data = await res.json();  
  
    let html = "<table><thead><tr><th>Subject</th><th>Marks</th></tr></thead><tbody>";  
    data.forEach(m => {  
      html += `<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`;  
    });  
    html += "</tbody></table>";  
    document.getElementById("marks-table").innerHTML = html;  
  }  
  
  // ─── LOAD QUIZ HISTORY ─────────────────────  
  async function loadQuizHistory() {  
    const res = await fetch(`${API}/quiz`); // ✅ FIX 4
    const data = await res.json();  
  
    document.getElementById("quiz-count").textContent = data.length;  
    document.getElementById("avg-score").textContent = "75%";  
  
    let html = "<table><thead><tr><th>Topic</th><th>Score</th></tr></thead><tbody>";  
    data.forEach(r => {  
      html += `<tr><td>${r.topic}</td><td>${r.score}</td></tr>`;  
    });  
    html += "</tbody></table>";  
    document.getElementById("quiz-history").innerHTML = html;  
  }  
  
  // ❌ FIX 5: ye disable (backend me nahi hai)
  // checkLatestQuiz();

  // Load everything  
  loadAttendance();  
  loadMarks();  
  loadQuizHistory();  
</script>  
</body>  
</html>
