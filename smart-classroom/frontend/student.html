<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h1>🎓 Smart Classroom</h1>
  <div class="user-info">
    <span id="nav-name">Student</span>
    <span id="nav-class"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <p class="page-title" id="welcome-msg">Welcome back!</p>

  <!-- STAT CARDS -->
  <div class="cards-row">
    <div class="stat-card green">
      <div class="num" id="att-pct">—</div>
      <div class="label">Attendance %</div>
    </div>
    <div class="stat-card blue">
      <div class="num" id="att-present">—</div>
      <div class="label">Days Present</div>
    </div>
    <div class="stat-card orange">
      <div class="num" id="quiz-count">—</div>
      <div class="label">Quizzes Taken</div>
    </div>
    <div class="stat-card purple">
      <div class="num" id="avg-score">—</div>
      <div class="label">Avg Quiz Score</div>
    </div>
  </div>

  <!-- LIVE QUIZ (if available) -->
  <div class="card" id="quiz-section" style="display:none">
    <h2>🔔 New Quiz Available!</h2>
    <div id="quiz-container"></div>
  </div>

  <!-- ATTENDANCE -->
  <div class="card">
    <h2>📅 My Attendance</h2>
    <div id="att-bar" style="margin-bottom:12px">
      <div class="progress-bar">
        <div class="progress-fill" id="att-progress" style="width:0%"></div>
      </div>
    </div>
    <div id="att-table"><div class="loading">Loading...</div></div>
  </div>

  <!-- MARKS -->
  <div class="card">
    <h2>📊 My Marks</h2>
    <div id="marks-table"><div class="loading">Loading...</div></div>
  </div>

  <!-- QUIZ HISTORY -->
  <div class="card">
    <h2>🧠 Quiz History</h2>
    <div id="quiz-history"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
  const API = "http://localhost:5001";
  const user = JSON.parse(localStorage.getItem("user") || "{}");
  const token = localStorage.getItem("token");

  if (!token || user.role !== "student") {
    window.location.href = "index.html";
  }

  document.getElementById("nav-name").textContent = user.name;
  document.getElementById("nav-class").textContent = "Class: " + (user.class || "");
  document.getElementById("welcome-msg").textContent = "Welcome, " + user.name + "! 👋";

  function logout() {
    localStorage.clear();
    window.location.href = "index.html";
  }

  function authHeader() {
    return { "Content-Type": "application/json", "Authorization": "Bearer " + token };
  }

  // ─── LOAD ATTENDANCE ───────────────────────────────────────────────────────
  async function loadAttendance() {
    const res = await fetch(`${API}/my-attendance`, { headers: authHeader() });
    const data = await res.json();

    document.getElementById("att-pct").textContent = data.percentage + "%";
    document.getElementById("att-present").textContent = data.present + "/" + data.total;

    const fill = document.getElementById("att-progress");
    fill.style.width = data.percentage + "%";
    if (data.percentage < 60) fill.classList.add("red");
    else if (data.percentage < 75) fill.classList.add("orange");

    if (data.records.length === 0) {
      document.getElementById("att-table").innerHTML = "<p style='color:#718096;font-size:14px'>No attendance records yet.</p>";
      return;
    }

    let html = "<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>";
    data.records.slice(0, 10).forEach(r => {
      html += `<tr><td>${r.date}</td><td><span class="badge ${r.status === 'present' ? 'green' : 'red'}">${r.status}</span></td></tr>`;
    });
    html += "</tbody></table>";
    document.getElementById("att-table").innerHTML = html;
  }

  // ─── LOAD MARKS ────────────────────────────────────────────────────────────
  async function loadMarks() {
    const res = await fetch(`${API}/my-marks`, { headers: authHeader() });
    const data = await res.json();

    if (data.length === 0) {
      document.getElementById("marks-table").innerHTML = "<p style='color:#718096;font-size:14px'>No marks added yet.</p>";
      return;
    }

    let html = "<table><thead><tr><th>Exam</th><th>Subject</th><th>Marks</th><th>Grade</th></tr></thead><tbody>";
    data.forEach(m => {
      const pct = Math.round((m.marks / m.totalMarks) * 100);
      const grade = pct >= 90 ? "A+" : pct >= 80 ? "A" : pct >= 70 ? "B" : pct >= 60 ? "C" : "F";
      const color = pct >= 70 ? "green" : pct >= 60 ? "orange" : "red";
      html += `<tr><td>${m.exam}</td><td>${m.subject}</td><td>${m.marks}/${m.totalMarks}</td><td><span class="badge ${color}">${grade} (${pct}%)</span></td></tr>`;
    });
    html += "</tbody></table>";
    document.getElementById("marks-table").innerHTML = html;
  }

  // ─── LOAD QUIZ HISTORY ─────────────────────────────────────────────────────
  async function loadQuizHistory() {
    const res = await fetch(`${API}/my-quiz-results`, { headers: authHeader() });
    const data = await res.json();

    document.getElementById("quiz-count").textContent = data.length;
    if (data.length > 0) {
      const avg = Math.round(data.reduce((s, r) => s + (r.score / r.total * 100), 0) / data.length);
      document.getElementById("avg-score").textContent = avg + "%";
    }

    if (data.length === 0) {
      document.getElementById("quiz-history").innerHTML = "<p style='color:#718096;font-size:14px'>No quizzes taken yet.</p>";
      return;
    }

    let html = "<table><thead><tr><th>Topic</th><th>Score</th><th>Date</th></tr></thead><tbody>";
    data.forEach(r => {
      const pct = Math.round((r.score / r.total) * 100);
      const color = pct >= 80 ? "green" : pct >= 60 ? "orange" : "red";
      const date = new Date(r.submittedAt).toLocaleDateString("en-IN");
      html += `<tr><td>${r.topic}</td><td><span class="badge ${color}">${r.score}/${r.total} (${pct}%)</span></td><td>${date}</td></tr>`;
    });
    html += "</tbody></table>";
    document.getElementById("quiz-history").innerHTML = html;
  }

  // ─── CHECK FOR LATEST QUIZ ─────────────────────────────────────────────────
  async function checkLatestQuiz() {
    const res = await fetch(`${API}/latest-quiz`, { headers: authHeader() });
    const data = await res.json();

    if (!data || data.attempted) return;

    const section = document.getElementById("quiz-section");
    section.style.display = "block";

    let html = `<div class="alert info">Topic: <strong>${data.quiz.topic}</strong> — ${data.quiz.questions.length} questions</div>`;
    html += `<form id="quiz-form">`;

    data.quiz.questions.forEach((q, i) => {
      html += `<div class="quiz-question">
        <p>${i + 1}. ${q.question}</p>`;
      q.options.forEach(opt => {
        html += `<label class="quiz-option">
          <input type="radio" name="q${i}" value="${opt}" required>
          ${opt}
        </label>`;
      });
      html += `</div>`;
    });

    html += `<button type="submit" class="btn btn-primary">Submit Quiz</button></form>`;
    document.getElementById("quiz-container").innerHTML = html;

    document.getElementById("quiz-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const answers = data.quiz.questions.map((_, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        return selected ? selected.value : "";
      });

      const r = await fetch(`${API}/submit-quiz`, {
        method: "POST",
        headers: authHeader(),
        body: JSON.stringify({ quizId: data.quiz._id, answers })
      });
      const result = await r.json();

      if (r.ok) {
        const pct = Math.round((result.score / result.total) * 100);
        document.getElementById("quiz-container").innerHTML = `
          <div class="alert success">
            🎉 Quiz submitted! Score: <strong>${result.score}/${result.total} (${pct}%)</strong>
          </div>`;
        loadQuizHistory();
      } else {
        document.getElementById("quiz-container").innerHTML += `<div class="alert error">${result.error}</div>`;
      }
    });
  }

  // Load everything
  loadAttendance();
  loadMarks();
  loadQuizHistory();
  checkLatestQuiz();
</script>
</body>
</html>
